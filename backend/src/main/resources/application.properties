spring.application.name=backend

# --- Database Configuratie (Pas aan naar jouw lokale DB) ---
# Voorbeeld voor PostgreSQL. Voor MySQL gebruik je: jdbc:mysql://localhost:3306/energiefixers
spring.datasource.url=jdbc:postgresql://localhost:5432/energiefixers
spring.datasource.username=postgres
spring.datasource.password=postgres

# Voorbeeld voor PostgreSQL. Voor MySQL gebruik je: com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Zorgt ervoor dat Hibernate je tabellen automatisch update op basis van je Entities
spring.jpa.hibernate.ddl-auto=update

# --- Mail Configuratie (Vul je SMTP gegevens in) ---
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Outbound email metadata ---
app.mail.from=no-reply@energiefixers071.com
app.frontend.url=http://localhost:3000

# --- JWT Configuratie ---
app.jwt.secret=EenHeelErgGeheimWachtwoordDatMinimaalTweeEnDertigKaraktersLangIs
app.jwt.expiration-minutes=12000