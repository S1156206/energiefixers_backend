spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# --- Database Configuratie (Pas aan naar jouw lokale DB) ---
# Voorbeeld voor PostgreSQL. Voor MySQL gebruik je: jdbc:mysql://localhost:3306/energiefixers
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Voorbeeld voor PostgreSQL. Voor MySQL gebruik je: com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Zorgt ervoor dat Hibernate je tabellen automatisch update op basis van je Entities
spring.jpa.hibernate.ddl-auto=update

# --- Mail Configuratie (Vul je SMTP gegevens in) ---
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Outbound email metadata ---
app.mail.from=${MAIL_FROM}
app.frontend.url=${FRONTEND_URL}
app.brevo.api-key=${BREVO_API_KEY}

# --- JWT Configuratie ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MIN}